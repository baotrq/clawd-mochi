; PlatformIO project config for Clawd Mochi (ESP32-C3 Super Mini)
; This builds the exact same clawd_mochi/*.ino sketch as the Arduino IDE —
; PlatformIO concatenates all .ino files in src_dir the same way Arduino does,
; so no files needed to move or be renamed. Arduino IDE remains a valid way
; to build this too; this is just an alternative toolchain.

[platformio]
src_dir = clawd_mochi

[env:esp32-c3-supermini]
platform = espressif32
; No official PlatformIO board def exists for the "Super Mini" clone boards yet;
; esp32-c3-devkitm-1 is the same module/pinout and is the commonly used stand-in.
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Native USB CDC so Serial works over the USB-C port — mirrors
; "USB CDC On Boot: Enabled" in the Arduino IDE board settings.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library